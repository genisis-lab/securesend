# Dependabot configuration.
#
# This is an npm *workspaces* repo: a single root package-lock.json covers the
# frontend and backend workspaces, so one npm entry at "/" updates all of them.
# Updates are grouped into a single PR per ecosystem to keep noise down.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
